name: Vantage Enterprise CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup .NET 10
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore Dependencies
      run: dotnet restore Vantage.sln

    - name: Build Solution (Strict Mode)
      run: dotnet build Vantage.sln --no-restore --configuration Release /warnaserror

    - name: Execute Test Suite
      run: dotnet test Vantage.sln --no-build --configuration Release --verbosity normal
